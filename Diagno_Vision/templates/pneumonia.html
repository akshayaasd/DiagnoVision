{% extends 'main.html' %}

{% block content %}
<script>
    function readURL(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();

            reader.onload = function (e) {
                $('#blah')
                    .attr('src', e.target.result)
                    .width(500)
                    .height(500);
            };

            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

{% if message %}
    <div class="alert alert-danger">{{ message }}</div>
{% endif %}

<div class="row">
    <div class="col-md-3"></div>
    <div class="col-md-6">
        <div class="text-center mb-4"><h1 class="mb-4">Pneumonia Predictor</h1></div>
        <div class="card card-body">
            <div class="text-center mb-4"><h3>Please upload the X-Ray of the Person</h3></div>
            <form class="form-horizontal" action="{{ url_for('pneumoniapredictPage') }}" method="POST" enctype="multipart/form-data">
                <div class="text-center mb-4">
                    <input onchange="readURL(this);" type="file" name="image" placeholder="Upload Image">
                    <br>
                    <br>
                    <img class="img-fluid" id="blah" src="#" alt="UPLOADED IMAGE WILL APPEAR HERE" />
                    <br>
                    <br>
                    <input class="btn btn-primary" type="submit" value="Submit">
                </div>
            </form>
        </div>
    </div>
    <div class="col-md-3"></div>
</div>
{% endblock %}
